<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto  Pequeños Gigantes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav style="display:flex; justify-content:flex-end;">

  <div class="dropdown">

    <button class="custom-menu"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" href="index.html">Inicio</a></li>
      <li><a class="dropdown-item" href="nosotros.html">Nosotros</a></li>
    </ul>

  </div>

</nav>


  <!-- Encabezado -->
  <header>
    <h1>¡Contáctanos!</h1>
    <p>¿Tienes dudas, sugerencias o quieres saludarnos? ¡Escríbenos!</p>
  </header>

  <!-- Formulario de contacto -->
  <main>
    <section class="formulario-contacto">
      <form action="#" method="post">
        <label for="nombre">Tu nombre</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Mariana Pérez" required>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" placeholder="Ej. mariana@email.com" required>

        <label for="mensaje">¿Cómo podemos ayudarte?</label>
        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>

        <button type="submit">Enviar mensaje</button>
      </form>
    </section>
  </main>
  <footer>
    <p>&copy; 2026 Pequeños Gigantes</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
